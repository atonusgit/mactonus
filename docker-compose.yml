services:
  mactonus:
    build: .
    container_name: mactonus
    restart: unless-stopped
    volumes:
      - "${VAULT_HOST_PATH}:/vault:rw"
      - "./conf/ssh:/root/.ssh"
      # Koko cron-kansio mountattuna -> uudet cron-tiedostot (myös kontissa
      # ajavan agentin luomat) näkyvät VS Codessa, aktivoituvat ja versioituvat.
      # HUOM: cron ohittaa /etc/cron.d:ssä tiedostot joiden nimessä on piste tai
      # muita merkkejä kuin [A-Za-z0-9_-] -> älä käytä .cron-päätettä.
      - "./conf/cron:/etc/cron.d"
      - "./scripts:/root/scripts"
      - "./logs/analyze_images:/tmp/analyze_images"
      - "./logs/cleanup_obsidian_notes:/tmp/cleanup_obsidian_notes"
      - "./logs/cleanup_transcripts:/tmp/cleanup_transcripts"
      - "./logs/refine_image_texts:/tmp/refine_image_texts"
      - "./logs/create_daily_summary:/tmp/create_daily_summary"
      - "./logs/eu_digital_sovereignty:/tmp/eu_digital_sovereignty"
      - "./logs/telegram:/tmp/telegram"
      - "./logs/pi_vault_sync:/tmp/pi_vault_sync"
      - "./logs/muisti:/tmp/muisti"
      - "./.pi:/root/.pi"
    env_file:
      - .env
    environment:
      - TZ=Europe/Helsinki
      - OLLAMA_API_KEY=ollama-local
      - OBSIDIAN_VAULT_PATH=/vault
    extra_hosts:
      - "host.docker.internal:host-gateway"
